<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Regístrate en Ironwall</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    background: #fafafa;
    color: #222;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; margin-bottom: 24px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 4px; }
  input {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
  }
  button {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #1a1a1a;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button:disabled { opacity: 0.5; }
  #error { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }
  #resultado { display: none; text-align: center; }
  #resultado h2 { font-size: 20px; }
  #qrcode { margin: 20px auto; display: inline-block; }
  #idClienteTexto { font-size: 22px; font-weight: 700; letter-spacing: 1px; margin: 10px 0; }
  .aviso {
    background: #fff3cd;
    border: 1px solid #ffe08a;
    border-radius: 8px;
    padding: 12px;
    font-size: 13px;
    margin-top: 16px;
    text-align: left;
  }
</style>
</head>
<body>

  <div id="formulario">
    <h1>Regístrate en Ironwall</h1>
    <p class="sub">Completa tus datos y recibe tu código de acceso personal.</p>

    <label>Nombre *</label>
    <input type="text" id="nombre" required oninput="soloLetras(this)">

    <label>Apellido *</label>
    <input type="text" id="apellido" required oninput="soloLetras(this)">

    <label>Teléfono</label>
    <input type="tel" id="telefono" inputmode="numeric" maxlength="15" placeholder="56912345678" oninput="soloNumeros(this)">

    <label>Email</label>
    <input type="email" id="email">

    <label>Dirección</label>
    <input type="text" id="direccion">

    <label>Comuna</label>
    <input type="text" id="comuna">

    <label>RUT *</label>
    <input type="text" id="rut" placeholder="12.345.678-9" required>

    <label>Teléfono de emergencia</label>
    <input type="tel" id="telefonoEmergencia" inputmode="numeric" maxlength="15" placeholder="56912345678" oninput="soloNumeros(this)">

    <label>Ocupación</label>
    <input type="text" id="ocupacion">

    <label>Fecha de nacimiento</label>
    <input type="date" id="fechaNacimiento">

    <div style="margin-top: 20px; padding: 14px; background: #f5f5f5; border-radius: 8px; font-size: 13px; max-height: 220px; overflow-y: auto; line-height: 1.5;" id="reglamentoContenido">
      Cargando reglamento...
    </div>

    <label style="display: flex; align-items: flex-start; gap: 8px; margin-top: 12px; font-weight: 400;">
      <input type="checkbox" id="aceptaReglamento" style="width: auto; margin-top: 3px;" disabled>
      <span>He leído y acepto el Reglamento Interno y el Deslinde de Responsabilidad. *</span>
    </label>

    <button id="btnEnviar" onclick="enviar()">Registrarme</button>
    <div id="error"></div>
  </div>

  <div id="resultado">
    <h2>¡Listo, <span id="nombreSaludo"></span>!</h2>
    <p>Este es tu código de acceso. Guárdalo — te lo pedirán cada vez que vengas.</p>
    <div id="qrcode"></div>
    <div id="idClienteTexto"></div>
    <div class="aviso">
      Consejo: toma una captura de pantalla de este código o guárdalo como imagen.
    </div>
  </div>

  <script>
    // ⚠️ IMPORTANTE: reemplaza esto por la URL de tu implementación de
    // Apps Script (la que termina en /exec). Es la misma que ya tienes.
    const API_URL = 'https://script.google.com/macros/s/AKfycbz7SvOi2JmjpRtLACJNVvzFtWKKeo9wUitjriZjW-JgNqPeFVliydyVy3NuNT6yiOcRbQ/exec';

    // Deja el campo solo con letras y espacios mientras la persona escribe
    // (incluye tildes y ñ).
    function soloLetras(input) {
      input.value = input.value.replace(/[^\p{L} ]/gu, '');
    }

    // Deja el campo solo con números mientras la persona escribe.
    function soloNumeros(input) {
      input.value = input.value.replace(/\D/g, '');
    }

    // El servidor a veces tarda (primera carga del día, tráfico alto).
    // "soloUnIntento=true" se usa para acciones que ESCRIBEN datos
    // (registrar, check-in, cargar pase): ahí NO conviene reintentar
    // solo, porque cancelar la espera en el navegador no cancela lo que
    // ya está corriendo en el servidor — un reintento automático podría
    // duplicar el registro o descontar un pase dos veces. Para lecturas
    // (buscar, listar) sí es seguro reintentar.
    function fetchConReintento(url, opciones, soloUnIntento) {
      const TIEMPO_ESPERA_MS = soloUnIntento ? 20000 : 15000;
      const intentos = soloUnIntento ? 1 : 2;

      function intentar(intentosRestantes) {
        const controlador = new AbortController();
        const timeoutId = setTimeout(function () { controlador.abort(); }, TIEMPO_ESPERA_MS);

        return fetch(url, Object.assign({}, opciones, { signal: controlador.signal }))
          .then(function (r) { clearTimeout(timeoutId); return r; })
          .catch(function (err) {
            clearTimeout(timeoutId);
            if (intentosRestantes > 1) {
              return intentar(intentosRestantes - 1);
            }
            if (soloUnIntento) {
              throw new Error('No pudimos confirmar si tu solicitud se completó. Antes de intentar de nuevo, revisa con el staff o en el sistema si ya quedó registrado, para evitar que se duplique.');
            }
            throw new Error('El servidor está tardando en responder. Intenta de nuevo en unos segundos.');
          });
      }

      return intentar(intentos);
    }

    // Valida el formato y dígito verificador de un RUT chileno.
    function limpiarRut(rut) {
      return String(rut || '').replace(/[^\dkK]/g, '').toUpperCase();
    }
    function validarRut(rutCompleto) {
      const limpio = limpiarRut(rutCompleto);
      if (limpio.length < 2) return false;
      const cuerpo = limpio.slice(0, -1);
      const dv = limpio.slice(-1);
      let suma = 0;
      let multiplo = 2;
      for (let i = cuerpo.length - 1; i >= 0; i--) {
        suma += multiplo * parseInt(cuerpo.charAt(i), 10);
        multiplo = multiplo < 7 ? multiplo + 1 : 2;
      }
      const resto = 11 - (suma % 11);
      const dvEsperado = resto === 11 ? '0' : (resto === 10 ? 'K' : String(resto));
      return dv === dvEsperado;
    }

    function llamarApi(accion, payload, esEscritura) {
      return fetchConReintento(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: accion, payload: payload })
      }, esEscritura).then(function (r) {
        return r.text().then(function (texto) {
          try {
            return JSON.parse(texto);
          } catch (e) {
            throw new Error('El servidor tardó en responder. Si ya completaste el formulario, es probable que tu registro se haya guardado igual — puedes intentar de nuevo en unos segundos, o consultar con el staff.');
          }
        });
      });
    }

    function cargarReglamento() {
      const contenedor = document.getElementById('reglamentoContenido');
      llamarApi('obtenerReglamento', {})
        .then(function (resp) {
          if (!resp.ok) throw new Error(resp.error || 'No se pudo cargar');
          renderReglamento(resp.data);
          document.getElementById('aceptaReglamento').disabled = false;
        })
        .catch(function () {
          contenedor.innerHTML = '<span style="color:#c0392b">No se pudo cargar el reglamento. '
            + '<a href="#" onclick="cargarReglamento(); return false;">Reintentar</a></span>';
        });
    }

    function renderReglamento(data) {
      const contenedor = document.getElementById('reglamentoContenido');
      let html = '<strong>Reglamento Interno</strong><ol style="margin: 8px 0 14px; padding-left: 20px;">';
      (data.reglamento || []).forEach(function (linea) {
        html += '<li>' + linea + '</li>';
      });
      html += '</ol><strong>Deslinde de Responsabilidad</strong>'
        + '<p style="margin: 8px 0 4px;">Al registrarte, declaras que:</p>'
        + '<ol style="margin: 0 0 8px; padding-left: 20px;">';
      (data.deslinde || []).forEach(function (linea) {
        html += '<li>' + linea + '</li>';
      });
      html += '</ol>';
      contenedor.innerHTML = html;
    }

    function enviar() {
      const btn = document.getElementById('btnEnviar');
      const errorDiv = document.getElementById('error');
      errorDiv.style.display = 'none';

      const nombre = document.getElementById('nombre').value.trim();
      const apellido = document.getElementById('apellido').value.trim();
      const rut = document.getElementById('rut').value.trim();

      if (!nombre || !apellido) {
        errorDiv.textContent = 'Nombre y apellido son obligatorios.';
        errorDiv.style.display = 'block';
        return;
      }
      if (!rut) {
        errorDiv.textContent = 'El RUT es obligatorio.';
        errorDiv.style.display = 'block';
        return;
      }
      if (!validarRut(rut)) {
        errorDiv.textContent = 'El RUT no es válido. Revisa el formato (ej: 12345678-9).';
        errorDiv.style.display = 'block';
        return;
      }

      const soloLetrasRegex = /^[\p{L} ]+$/u;
      if (!soloLetrasRegex.test(nombre) || !soloLetrasRegex.test(apellido)) {
        errorDiv.textContent = 'Nombre y apellido solo pueden contener letras.';
        errorDiv.style.display = 'block';
        return;
      }

      const telefono = document.getElementById('telefono').value.trim();
      const telefonoEmergencia = document.getElementById('telefonoEmergencia').value.trim();
      if (telefono && (telefono.length < 8 || telefono.length > 15)) {
        errorDiv.textContent = 'El teléfono debe incluir el código de país, solo números (ej: 56912345678).';
        errorDiv.style.display = 'block';
        return;
      }
      if (telefonoEmergencia && (telefonoEmergencia.length < 8 || telefonoEmergencia.length > 15)) {
        errorDiv.textContent = 'El teléfono de emergencia debe incluir el código de país, solo números.';
        errorDiv.style.display = 'block';
        return;
      }

      const email = document.getElementById('email').value.trim();
      const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;
      if (email && !emailRegex.test(email)) {
        errorDiv.textContent = 'El email no es válido. Revisa que tenga un dominio completo (ej: nombre@gmail.com).';
        errorDiv.style.display = 'block';
        return;
      }

      if (!document.getElementById('aceptaReglamento').checked) {
        errorDiv.textContent = 'Debes aceptar el Reglamento Interno y el Deslinde de Responsabilidad para registrarte.';
        errorDiv.style.display = 'block';
        return;
      }

      const datos = {
        nombre: nombre,
        apellido: apellido,
        rut: rut,
        telefono: document.getElementById('telefono').value.trim(),
        email: document.getElementById('email').value.trim(),
        direccion: document.getElementById('direccion').value.trim(),
        comuna: document.getElementById('comuna').value.trim(),
        telefonoEmergencia: document.getElementById('telefonoEmergencia').value.trim(),
        ocupacion: document.getElementById('ocupacion').value.trim(),
        fechaNacimiento: document.getElementById('fechaNacimiento').value,
        aceptaReglamento: document.getElementById('aceptaReglamento').checked
      };

      btn.disabled = true;
      btn.textContent = 'Registrando...';

      // Si tras 5 segundos sigue esperando, se lo hacemos saber —
      // así no parece que la página se colgó.
      const avisoLento = setTimeout(function () {
        btn.textContent = 'Esto puede tardar unos segundos más...';
      }, 5000);

      llamarApi('registrar', datos, true)
        .then(function (resp) {
          clearTimeout(avisoLento);
          if (!resp.ok) throw new Error(resp.error || 'Error desconocido');
          mostrarResultado(resp.data.idCliente, nombre, resp.data.yaExistia, resp.data.motivo);
        })
        .catch(function (err) {
          clearTimeout(avisoLento);
          btn.disabled = false;
          btn.textContent = 'Registrarme';
          errorDiv.textContent = 'Ocurrió un error: ' + err.message;
          errorDiv.style.display = 'block';
        });
    }

    function mostrarResultado(idCliente, nombre, yaExistia, motivo) {
      document.getElementById('formulario').style.display = 'none';
      document.getElementById('resultado').style.display = 'block';
      document.getElementById('nombreSaludo').textContent = nombre;
      document.getElementById('idClienteTexto').textContent = idCliente;

      if (yaExistia) {
        document.querySelector('#resultado h2').textContent = '¡Ya tenías una cuenta, ' + nombre + '!';
        if (motivo === 'datos_similares') {
          document.querySelector('#resultado p').textContent =
            'Encontramos un registro anterior con tu mismo nombre y datos de contacto — probablemente el RUT tenía un error de tipeo la vez pasada. Este sigue siendo tu código de acceso. Si necesitas corregir tu RUT, avísale al staff.';
        } else {
          document.querySelector('#resultado p').textContent =
            'Encontramos tu registro anterior. Este sigue siendo tu código de acceso.';
        }
      }

      new QRCode(document.getElementById('qrcode'), {
        text: idCliente,
        width: 200,
        height: 200
      });
    }

    cargarReglamento();
  </script>
</body>
</html>
