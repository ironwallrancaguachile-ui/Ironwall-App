<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Movimientos - Ironwall</title>
<style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, Arial, sans-serif;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 60px;
    background: #fafafa;
    color: #222;
  }
  h1 { font-size: 22px; margin-bottom: 4px; }
  p.sub { color: #666; margin-top: 0; margin-bottom: 24px; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin: 14px 0 4px; }
  input, select {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
  }
  .tipo-botones { display: flex; gap: 8px; margin-top: 6px; }
  .tipo-botones button {
    flex: 1;
    padding: 12px;
    border: 2px solid #ccc;
    border-radius: 8px;
    background: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .tipo-botones button.activo-ingreso { border-color: #1e824c; background: #e8f6ee; color: #1e824c; }
  .tipo-botones button.activo-egreso { border-color: #c0392b; background: #fdecea; color: #c0392b; }
  button.enviar {
    width: 100%;
    margin-top: 24px;
    padding: 14px;
    font-size: 16px;
    font-weight: 600;
    color: #fff;
    background: #1a1a1a;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  button.enviar:disabled { opacity: 0.5; }
  #error { color: #c0392b; font-size: 13px; margin-top: 10px; display: none; }
  #ok { color: #1e824c; font-size: 14px; margin-top: 10px; display: none; font-weight: 600; }
</style>
</head>
<body>

  <h1>Registrar movimiento</h1>
  <p class="sub">Ingresos y egresos del día — quedan directo en la planilla de Finanzas.</p>

  <label>Tipo *</label>
  <div class="tipo-botones">
    <button type="button" id="btnIngreso" onclick="elegirTipo('Ingreso')">Ingreso</button>
    <button type="button" id="btnEgreso" onclick="elegirTipo('Egreso')">Egreso</button>
  </div>

  <label>Categoría *</label>
  <select id="categoria">
    <option value="">-- Primero elige Ingreso o Egreso --</option>
  </select>

  <label>Medio de pago *</label>
  <select id="medioPago">
    <option value="">-- Selecciona --</option>
    <option value="Mercado Pago">Mercado Pago</option>
    <option value="Transferencia">Transferencia</option>
    <option value="Efectivo">Efectivo</option>
  </select>

  <label>Monto (CLP) *</label>
  <input type="text" id="monto" inputmode="numeric" placeholder="45000" oninput="soloNumeros(this)">

  <label>Descripción</label>
  <input type="text" id="descripcion" placeholder="Ej: Mensualidad adulto IWR7K9QX">

  <label>N° de comprobante (boleta/factura)</label>
  <input type="text" id="comprobante" placeholder="Opcional">

  <label>Registrado por *</label>
  <select id="responsable">
    <option value="">-- Selecciona tu nombre --</option>
  </select>

  <button class="enviar" id="btnEnviar" onclick="enviar()">Registrar movimiento</button>
  <div id="error"></div>
  <div id="ok"></div>

  <script>
    // ⚠️ Reemplaza por la URL de TU implementación del Apps Script de FINANZAS.
    const API_URL_FINANZAS = 'https://script.google.com/macros/s/AKfycbx29m90hiJKT3UKP2uJCJSm5XcEfjWwCcMYokLnw54RBTpyGLierukwYNYdCJxCiEaKng/exec';

    // ⚠️ Esta es la URL del Apps Script del sistema de CLIENTES (el que ya
    // tienes), se reutiliza solo para traer la lista de staff y no duplicarla.
    const API_URL_CLIENTES = 'https://script.google.com/macros/s/AKfycbz7SvOi2JmjpRtLACJNVvzFtWKKeo9wUitjriZjW-JgNqPeFVliydyVy3NuNT6yiOcRbQ/exec';

    let tipoSeleccionado = '';
    let categoriasCache = [];

    function soloNumeros(input) {
      input.value = input.value.replace(/\D/g, '');
    }

    function fetchConReintento(url, opciones, soloUnIntento) {
      const TIEMPO_ESPERA_MS = soloUnIntento ? 20000 : 15000;
      const intentos = soloUnIntento ? 1 : 2;

      function intentar(intentosRestantes) {
        const controlador = new AbortController();
        const timeoutId = setTimeout(function () { controlador.abort(); }, TIEMPO_ESPERA_MS);

        return fetch(url, Object.assign({}, opciones, { signal: controlador.signal }))
          .then(function (r) { clearTimeout(timeoutId); return r; })
          .catch(function (err) {
            clearTimeout(timeoutId);
            if (intentosRestantes > 1) {
              return intentar(intentosRestantes - 1);
            }
            if (soloUnIntento) {
              throw new Error('No pudimos confirmar si el movimiento se registró. Antes de repetirlo, revisa la hoja de Movimientos para evitar duplicarlo.');
            }
            throw new Error('El servidor está tardando en responder. Intenta de nuevo en unos segundos.');
          });
      }

      return intentar(intentos);
    }

    function llamarApi(url, accion, payload, esEscritura) {
      return fetchConReintento(url, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify({ action: accion, payload: payload })
      }, esEscritura).then(function (r) {
        return r.text().then(function (texto) {
          try { return JSON.parse(texto); }
          catch (e) { throw new Error('El servidor tardó en responder. Intenta de nuevo.'); }
        });
      });
    }

    function elegirTipo(tipo) {
      tipoSeleccionado = tipo;
      document.getElementById('btnIngreso').className = tipo === 'Ingreso' ? 'activo-ingreso' : '';
      document.getElementById('btnEgreso').className = tipo === 'Egreso' ? 'activo-egreso' : '';
      pintarCategorias();
    }

    function pintarCategorias() {
      const select = document.getElementById('categoria');
      const opciones = categoriasCache.filter(function (c) { return c.tipo === tipoSeleccionado; });
      select.innerHTML = '<option value="">-- Selecciona --</option>' +
        opciones.map(function (c) { return '<option value="' + c.categoria + '">' + c.categoria + '</option>'; }).join('');
    }

    function cargarCategorias() {
      const cache = leerCache_('categorias_finanzas_cache');
      if (cache) { categoriasCache = cache; pintarCategorias(); }

      llamarApi(API_URL_FINANZAS, 'listarCategorias', {})
        .then(function (resp) {
          if (resp.ok) {
            categoriasCache = resp.data;
            guardarCache_('categorias_finanzas_cache', resp.data);
            pintarCategorias();
          }
        })
        .catch(function () { /* seguimos con la caché si falla */ });
    }

    function cargarStaff() {
      const select = document.getElementById('responsable');

      function pintar(nombres) {
        const valorPrevio = select.value;
        select.innerHTML = '<option value="">-- Selecciona tu nombre --</option>' +
          nombres.map(function (n) { return '<option value="' + n + '">' + n + '</option>'; }).join('');
        if (valorPrevio && nombres.indexOf(valorPrevio) !== -1) select.value = valorPrevio;
      }

      const cache = leerCache_('staff_finanzas_cache');
      if (cache) pintar(cache);

      llamarApi(API_URL_CLIENTES, 'listarStaff', {})
        .then(function (resp) {
          if (resp.ok && resp.data) {
            pintar(resp.data);
            guardarCache_('staff_finanzas_cache', resp.data);
          }
        })
        .catch(function () { /* seguimos con la caché si falla */ });
    }

    function guardarCache_(clave, datos) {
      try { localStorage.setItem(clave, JSON.stringify({ datos: datos, guardado: Date.now() })); }
      catch (e) { /* si el navegador bloquea localStorage, no pasa nada grave */ }
    }
    function leerCache_(clave) {
      try {
        const crudo = localStorage.getItem(clave);
        if (!crudo) return null;
        const parsed = JSON.parse(crudo);
        const DOCE_HORAS_MS = 12 * 60 * 60 * 1000;
        if (Date.now() - parsed.guardado > DOCE_HORAS_MS) return null;
        return parsed.datos;
      } catch (e) { return null; }
    }

    function enviar() {
      const btn = document.getElementById('btnEnviar');
      const errorDiv = document.getElementById('error');
      const okDiv = document.getElementById('ok');
      errorDiv.style.display = 'none';
      okDiv.style.display = 'none';

      const categoria = document.getElementById('categoria').value;
      const medioPago = document.getElementById('medioPago').value;
      const monto = document.getElementById('monto').value.trim();
      const responsable = document.getElementById('responsable').value;

      if (!tipoSeleccionado) { mostrarError('Elige si es Ingreso o Egreso.'); return; }
      if (!categoria) { mostrarError('Elige una categoría.'); return; }
      if (!medioPago) { mostrarError('Elige un medio de pago.'); return; }
      if (!monto || Number(monto) <= 0) { mostrarError('Ingresa un monto válido.'); return; }
      if (!responsable) { mostrarError('Elige quién registra el movimiento.'); return; }

      const datos = {
        tipo: tipoSeleccionado,
        categoria: categoria,
        medioPago: medioPago,
        monto: Number(monto),
        descripcion: document.getElementById('descripcion').value.trim(),
        comprobante: document.getElementById('comprobante').value.trim(),
        responsable: responsable
      };

      btn.disabled = true;
      btn.textContent = 'Registrando...';

      const avisoLento = setTimeout(function () { btn.textContent = 'Esto puede tardar unos segundos más...'; }, 5000);

      llamarApi(API_URL_FINANZAS, 'registrarMovimiento', datos, true)
        .then(function (resp) {
          clearTimeout(avisoLento);
          if (!resp.ok) throw new Error(resp.error || 'Error desconocido');
          okDiv.textContent = '✅ Movimiento registrado correctamente.';
          okDiv.style.display = 'block';
          limpiarFormulario();
        })
        .catch(function (err) {
          clearTimeout(avisoLento);
          mostrarError(err.message);
        })
        .finally(function () {
          btn.disabled = false;
          btn.textContent = 'Registrar movimiento';
        });
    }

    function mostrarError(msg) {
      const errorDiv = document.getElementById('error');
      errorDiv.textContent = msg;
      errorDiv.style.display = 'block';
    }

    function limpiarFormulario() {
      document.getElementById('monto').value = '';
      document.getElementById('descripcion').value = '';
      document.getElementById('comprobante').value = '';
      // Se mantienen Tipo, Categoría, Medio de pago y Responsable —
      // suele repetirse varias veces seguidas al cerrar caja.
    }

    cargarCategorias();
    cargarStaff();
  </script>
</body>
</html>
